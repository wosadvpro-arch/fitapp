<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FitApp</title>
    <style>
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

      :root {
        --accent: #2563EB;
        --accent-dark: #1d4ed8;
        --accent-light: #EFF6FF;
        --bg: #f0f4f8;
        --white: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --subtle: #94a3b8;
        --border: #e2e8f0;
        --surface: #f8fafc;
        --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
        --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
        --shadow-frame: 0 40px 100px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
        --radius: 16px;
        --radius-lg: 24px;
        --radius-frame: 48px;
      }

      html { height: 100%; }
      body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { height: 100%; }

      /* ── Shell: mobile = full screen, desktop = moldura ── */
      .app-shell {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }
      .app-frame {
        width: 100%;
        height: 100%;
        background: var(--white);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      @media (min-width: 600px) {
        .app-shell {
          padding: 32px 20px;
          min-height: 100vh;
          height: auto;
          background: linear-gradient(145deg, #dbeafe 0%, #e0f2fe 40%, #ede9fe 100%);
        }
        .app-frame {
          width: 390px;
          height: min(820px, 90vh);
          border-radius: var(--radius-frame);
          box-shadow: var(--shadow-frame);
        }
      }

      /* ── Scrollbar ── */
      .scroll-hide { scrollbar-width: none; -ms-overflow-style: none; }
      .scroll-hide::-webkit-scrollbar { display: none; }

      /* ── Buttons ── */
      .btn-primary {
        width: 100%; padding: 17px;
        background: var(--accent); color: #fff;
        border: none; border-radius: var(--radius);
        font-size: 16px; font-weight: 700; cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        -webkit-tap-highlight-color: transparent;
      }
      .btn-primary:hover  { background: var(--accent-dark); }
      .btn-primary:active { transform: scale(0.98); }
      .btn-primary:disabled { opacity: 0.38; cursor: default; transform: none; }

      /* ── Option card ── */
      .opt-btn {
        background: var(--surface);
        border: 2px solid transparent;
        border-radius: var(--radius);
        cursor: pointer; width: 100%;
        display: flex; align-items: center;
        gap: 14px; padding: 16px 18px;
        transition: background 0.15s, border-color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .opt-btn:hover   { background: #e8f0fe; border-color: #93c5fd; }
      .opt-btn.sel     { background: var(--accent-light); border-color: var(--accent); }
      .opt-btn.grid    { flex-direction: column; align-items: center; padding: 16px 10px; }

      /* ── Nav ── */
      .bottom-nav {
        background: var(--white);
        border-top: 1px solid var(--border);
        display: flex;
        padding: 10px 0;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        flex-shrink: 0;
      }
      .nav-btn {
        flex: 1; background: none; border: none; cursor: pointer;
        display: flex; flex-direction: column; align-items: center;
        gap: 3px; padding: 4px 0;
        -webkit-tap-highlight-color: transparent;
        transition: opacity 0.1s;
      }
      .nav-btn:active { opacity: 0.6; }

      /* ── Workout card ── */
      .workout-card {
        background: var(--white);
        border-radius: 20px; margin-bottom: 16px;
        overflow: hidden; cursor: pointer;
        box-shadow: var(--shadow-sm);
        transition: transform 0.15s, box-shadow 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .workout-card:hover  { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
      .workout-card:active { transform: scale(0.985); }

      /* ── Day card ── */
      .day-card {
        flex: 1; background: var(--white);
        border-radius: var(--radius); padding: 12px 14px;
        margin-left: 10px; display: flex; align-items: center;
        gap: 12px; border: 2px solid transparent;
        transition: all 0.15s; box-shadow: var(--shadow-sm);
        -webkit-tap-highlight-color: transparent;
      }
      .day-card:hover  { box-shadow: var(--shadow-md); }
      .day-card.active { border-color: var(--accent); box-shadow: 0 4px 20px rgba(37,99,235,0.15); }
      .day-card.locked { opacity: 0.45; pointer-events: none; }

      /* ── Modal overlay ── */
      .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.92); z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        padding: 16px;
        animation: fadeIn 0.18s ease;
      }
      @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
      .modal-inner { width: 100%; max-width: 460px; }

      /* ── Info card ── */
      .info-card {
        border-radius: var(--radius); padding: 14px 16px; margin-top: 18px;
      }

      /* ── Number picker ruler ── */
      .ruler { display: flex; justify-content: center; align-items: flex-end; gap: 1.5px; height: 28px; margin-top: 12px; }

      /* ── Progress stats grid ── */
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

      /* ── Responsive tweaks inside frame ── */
      @media (max-width: 599px) {
        .workout-card:hover { transform: none; box-shadow: var(--shadow-sm); }
        .day-card:hover     { box-shadow: var(--shadow-sm); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
